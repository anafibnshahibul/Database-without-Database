<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login & Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
    <h2 id="form-title" style="margin-top:0;">Login</h2>
    <div id="msg-box" class="message-box"></div>

    <form id="auth-form">
        <div class="form-group hidden" id="name-group">
            <label>Full Name</label>
            <input type="text" id="user_name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="user_email" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="user_password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Login</button>
    </form>

    <p class="toggle-text" onclick="toggleForm()">
        <span id="toggle-link">Need an account? Register here.</span>
    </p>
</div>

<script src="js/db-config.js"></script>

</body>
</html>
